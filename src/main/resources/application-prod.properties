# ── Perfil de PRODUCCIÓN ─────────────────────────────────────────────────────
# Activo cuando SPRING_PROFILES_ACTIVE=prod (Docker Compose / Railway)
# Las credenciales se leen de variables de entorno, nunca hardcodeadas.

# Conexión a PostgreSQL mediante variables de entorno
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — validate: no modifica el esquema en producción
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging reducido en producción
logging.level.root=WARN
logging.level.com.empresa.catalogo=INFO

# Swagger deshabilitado en producción
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator — solo health e info expuestos
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

server.port=8080
