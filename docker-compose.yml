version: "3.9"

services:

  # ── Servicio de la aplicación Spring Boot ────────────────────────────────
  app:
    build: .
    container_name: catalogo-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://db:5432/appdb
      - DB_USER=appuser
      - DB_PASS=apppass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

  # ── Servicio de base de datos PostgreSQL ─────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: catalogo-db
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-net
    restart: unless-stopped

# ── Volumen persistente para datos de PostgreSQL ─────────────────────────
volumes:
  postgres-data:

# ── Red interna para comunicación entre servicios ────────────────────────
networks:
  app-net:
